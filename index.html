<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Todo App</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <main>
            <!-- Page heading -->
            <h1 class="page-heading">Create your Todo-List</h1>

            <!-- Form -->
            <form action="" class="todo-form" id="todo-form">
                <input
                    type="text"
                    id="todo-input"
                    class="input"
                    placeholder="What are your tasks for today?"
                    spellcheck="false"
                    maxlength="20"
                />
                <button id="submit" class="submit-btn">Add</button>
            </form>

            <!-- Task list -->
            <ul id="task-list" class="task-list">
            </ul>
        </main>
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.7/purify.min.js"
            integrity="sha512-78KH17QLT5e55GJqP76vutp1D2iAoy06WcYBXB6iBCsmO6wWzx0Qdg8EDpm8mKXv68BcvHOyeeP4wxAL0twJGQ=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        ></script>
        <script src="main.js"></script>
    </body>
</html>
